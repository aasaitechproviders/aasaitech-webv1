name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Fix asset paths for GitHub Pages subpath
        run: |
          BASE="/aasaitech-webv1"
          find dist -name "*.html" | while read f; do
            sed -i \
              -e "s|href=\"/assets/|href=\"${BASE}/assets/|g" \
              -e "s|src=\"/assets/|src=\"${BASE}/assets/|g" \
              -e "s|href=\"/images/|href=\"${BASE}/images/|g" \
              -e "s|src=\"/images/|src=\"${BASE}/images/|g" \
              -e "s|href=\"/static-loader|href=\"${BASE}/static-loader|g" \
              "$f"
          done
          find dist -name "*.js" | xargs grep -l 'static-loader-data-manifest' | while read f; do
            sed -i "s|\"static-loader-data-manifest|\"${BASE}/static-loader-data-manifest|g" "$f"
            sed -i "s|fetch(\"/static-loader|fetch(\"${BASE}/static-loader|g" "$f"
          done

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: www.aasaitech.in
